_target_: src.lightning_modules.PairedDSB

defaults:
  - /encoders@encoder_decoder: identity
  - /networks@model: mamba
  - /losses@loss_fn: l1
  - /optimizer: adamw
  - /lr_scheduler: constant

encoder_decoder:
  scaling_factor: 20

scheduler:
  _target_: src.lightning_modules.DSBScheduler
  epsilon: 0.1
  target: drift
  condition_on_start: False
