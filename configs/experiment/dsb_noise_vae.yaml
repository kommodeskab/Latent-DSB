# @package _global_
defaults:
  - override /trainer: gpu
  - override /data: dsb
  - override /callbacks: dsb
  - override /model: dsb
  - override /logger: default

project_name: 'dsb'
task_name: 'dsb noise vae'

AUDIO_LENGTH: 4.096

callbacks:
  dsb_callback:
    _target_: src.callbacks.DSBCallback
    num_steps: 50
    scheduler_type: 'cosine'
    what_media: 'audio'
    sample_rate: 16000
  eval_callback:
    _target_: src.callbacks.EvalMetricCallback
    what_test: 'clip'
    dataset_size: 32

  log_grads:
    log_every_n_steps: 1

data:
  dataset:
    _target_: src.dataset.DSBDataset
    cache_size: 512

    x0_dataset:
      _target_: src.dataset.AllVCTK
      length_seconds: ${AUDIO_LENGTH}
      sample_rate: 16000
      train: True

    x1_dataset:
      _target_: src.dataset.VCTKWHAM
      length_seconds: ${AUDIO_LENGTH}
      sample_rate: 16000
      train: True

  val_dataset:
    _target_: src.dataset.DSBDataset
    cache_size: 0
  
    x0_dataset:
      _target_: src.dataset.AllVCTK
      length_seconds: ${AUDIO_LENGTH}
      sample_rate: 16000
      train: False

    x1_dataset:
      _target_: src.dataset.VCTKWHAM
      length_seconds: ${AUDIO_LENGTH}
      sample_rate: 16000
      train: False

  num_workers: 12
  batch_size: 4
  shuffle: False
  drop_last: True

model:
  _target_: src.lightning_modules.DSB

  pretraining_steps: 100000
  inference_steps: 20
  cache_batch_size: 64
  populate_every_n_steps: 4096

  model:
    _target_: src.networks.ConditionalTimeSeriesTransformer
    input_dim: 256
    d_model: 512
    nhead: 8
    num_layers: 20
    causal: False
    dropout: 0.0
    num_classes: 2

  loss_fn:
    _target_: src.losses.SmoothL1Loss

  scheduler:
    _target_: src.lightning_modules.dsb_scheduler.DSBScheduler
    epsilon: 2.0
    condition_on_start: False
    target: 'drift'

  encoder_decoder: 
    _target_: src.networks.PretrainedVAENetwork
    id: "271125053433"

  optimizer:
    _target_: torch.optim.AdamW
    _partial_: True
    lr: 1.e-4
    weight_decay: 0.0

  lr_scheduler:
    scheduler:
      _target_: torch.optim.lr_scheduler.ConstantLR
      _partial_: True
      factor: 1.0
      total_iters: 1
    monitor: 'val_loss'
    interval: 'step'
    frequency: 1

trainer:
  fast_dev_run: False
  enable_checkpointing: True
  log_every_n_steps: 1
  reload_dataloaders_every_n_epochs: 1
  val_check_interval: 3000
  check_val_every_n_epoch: !!null
  gradient_clip_val: 1.0
  max_epochs: -1
  max_steps: 300000
  precision: 'bf16'
  limit_val_batches: 20