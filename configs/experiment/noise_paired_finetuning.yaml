# @package _global_

# paired denoising with clean: VCTK and noisy: VCTK + WHAM

defaults:
  - override /trainer: gpu
  - override /data: noise_paired
  - override /callbacks: dsb
  - override /model: finetuning
  - override /logger: default

project_name: 'denoising'
task_name: 'paired denoising'
compile: True
phase: 'train'

train_audio_length: 48000
test_audio_length: 48000
sample_rate: 16000

data:
  batch_size: 8
  num_workers: 12

model:
  pretraining_steps: 300_000

  scheduler:
    epsilon: 1.0

trainer:
  max_steps: 400_000
  log_every_n_steps: 100
  max_epochs: -1
  limit_val_batches: 100
