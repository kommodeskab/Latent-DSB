# @package _global_
defaults:
  - override /trainer: gpu
  - override /data: lombard
  - override /callbacks: dsb
  - override /model: dsb
  - override /logger: default

project_name: 'dsb'
task_name: 'lombard'
compile: False

AUDIO_LENGTH: 4.096

callbacks:
  dsb_callback:
    _target_: src.callbacks.DSBCallback
    num_steps: 50
    scheduler_type: 'cosine'
    what_media: 'audio'
    sample_rate: 16000

data:
  dataset:
    _target_: src.dataset.DSBDataset
    cache_size: 512

    x0_dataset:
      _target_: src.dataset.AllVCTK
      length_seconds: ${AUDIO_LENGTH}
      sample_rate: 16000
      train: True

    x1_dataset:
      _target_: src.dataset.AllLombardDataset
      length_seconds: ${AUDIO_LENGTH}
      sample_rate: 16000
      split: 'train'

  val_dataset:
    _target_: src.dataset.DSBDataset
    cache_size: 0
  
    x0_dataset:
      _target_: src.dataset.AllVCTK
      length_seconds: ${AUDIO_LENGTH}
      sample_rate: 16000
      train: False

    x1_dataset:
      _target_: src.dataset.AllLombardDataset
      length_seconds: ${AUDIO_LENGTH}
      sample_rate: 16000
      split: 'validation'

  num_workers: 16
  batch_size: 4
  shuffle: False
  drop_last: True

model:
  pretraining_steps: 150000 # only pretrain
  inference_steps: 20
  cache_batch_size: 64
  populate_every_n_steps: 4096

  model:
    _target_: src.networks.dhariwal.UNetModel
    in_channels: 2
    out_channels: 2
    model_channels: 64
    num_res_blocks: 2
    attention_resolutions: [16, 8]
    dropout: 0.1
    channel_mult: [1, 2, 4, 8]
    num_classes: 2
    num_heads: 4

  scheduler:
    _target_: src.lightning_modules.dsb_scheduler.DSBScheduler
    epsilon: 0.5
    condition_on_start: False
    target: 'drift'

  loss_fn:
    _target_: src.losses.MSELoss

  encoder_decoder: 
    _target_: src.networks.STFTEncoderDecoder
    n_fft: 510
    hop_length: 128
    alpha: 0.25
    beta: 1.0

  optimizer:
    _target_: torch.optim.AdamW
    _partial_: True
    lr: 1.e-4
    weight_decay: 0.0

  lr_scheduler:
    scheduler:
      _target_: torch.optim.lr_scheduler.ConstantLR
      _partial_: True
      factor: 1.0
      total_iters: 1
    monitor: 'val_loss'
    interval: 'step'
    frequency: 1

trainer:
  fast_dev_run: False
  enable_checkpointing: True
  log_every_n_steps: 1
  reload_dataloaders_every_n_epochs: 1
  val_check_interval: 5000
  check_val_every_n_epoch: !!null
  gradient_clip_val: 1.0
  max_epochs: -1
  max_steps: 300000
  precision: 'bf16-mixed'
  limit_val_batches: 20