# @package _global_

defaults:
  - dsb
  - override /data: reverb_wham

project_name: 'dereverberation'
task_name: 'wham + reverb'

train_audio_length: 16000

data:
  batch_size: 18

model:
  pretraining_steps: 250_000
  inference_steps: 20

  scheduler:
    epsilon: 0.1
    target: drift

trainer:
  max_steps: 300_000