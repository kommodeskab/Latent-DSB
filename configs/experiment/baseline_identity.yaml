# @package _global_

defaults:
  - override /trainer: gpu
  - override /data: noisy
  - override /callbacks: test_metrics
  - override /model: identity
  - override /logger: default

project_name: 'baselines'
task_name: 'identity'
compile: False
phase: 'test'

audio_length: 32768
sample_rate: 16000

data:
  batch_size: 8
  num_workers: 12

trainer:
  log_every_n_steps: 100
  max_epochs: -1
  max_steps: -1
  limit_val_batches: 100
  inference_mode: False
