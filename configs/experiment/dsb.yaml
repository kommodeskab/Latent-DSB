# @package _global_

# The standard config for schrödinger bridge experiments

defaults:
  - override /trainer: gpu
  - override /data: ???
  - override /callbacks: dsb
  - override /model: dsb
  - override /model: dsb
  - override /logger: default

project_name: ???
task_name: ???
compile: True
phase: 'train'

train_audio_length: 48000
test_audio_length: 48000
sample_rate: 16000

data:
  batch_size: 8
  num_workers: 12

model:
  pretraining_steps: 200_000

  scheduler:
    epsilon: 0.1
    target: drift

logger:
  log_model: True

trainer:
  max_steps: 300_000
  log_every_n_steps: 100
  max_epochs: -1
  limit_val_batches: 50
