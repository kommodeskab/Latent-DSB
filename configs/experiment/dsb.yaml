# @package _global_

# The standard config for schrödinger bridge experiments

defaults:
  - override /trainer: gpu
  - override /data: ???
  - override /callbacks: dsb
  - override /model: standard
  - override /logger: default

project_name: ???
task_name: ???
compile: True
phase: 'train'

train_audio_length: 48000
test_audio_length: 48000
sample_rate: 16000

data:
  batch_size: 8
  num_workers: 12

model:
  pretraining_steps: 300_000

  scheduler:
    epsilon: 2.0

logger:
  log_model: True

trainer:
  max_steps: 400_000
  log_every_n_steps: 100
  max_epochs: -1
  limit_val_batches: 100
