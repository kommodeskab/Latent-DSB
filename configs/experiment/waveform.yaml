# @package _global_

defaults:
  - override /trainer: gpu
  - override /data: noisy
  - override /callbacks: dsb
  - override /model: waveform
  - override /logger: default

project_name: 'unpaired-audio-diffusion'
task_name: 'test'
compile: False
phase: 'train'

audio_length: 48000
sample_rate: 16000

data:
  batch_size: 8
  num_workers: 12

trainer:
  log_every_n_steps: 100
  max_epochs: -1
  max_steps: -1
  limit_val_batches: 100
