# @package _global_

# The standard config for schrödinger bridge experiments

defaults:
  - override /trainer: gpu
  - override /data: reverb_paired
  - override /callbacks: dsb
  - override /model: paired_dsb
  - override /logger: default

project_name: 'reverberation'
task_name: 'paired dsb'
compile: True
phase: 'train'

train_audio_length: 16000
test_audio_length: 48000
sample_rate: 16000

data:
  batch_size: 24
  num_workers: 12

model:
  scheduler:
    epsilon: 0.1
    target: terminal

logger:
  log_model: True

trainer:
  max_steps: 200_000
  log_every_n_steps: 100
  max_epochs: -1
  limit_val_batches: 50
