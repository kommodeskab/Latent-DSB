_target_: src.data_modules.BaseDM

# PAIRED
# Clean data: VCTK
# Degraded data: VCTK + fsd50k noise

defaults:
    # the degraded dataset is VCTK with fsd50k noise added to it
    # and the clean dataset is VCTK without noise
  - /datasets@trainset.degraded_dataset.dataset: vctk_train
  - /datasets@valset.degraded_dataset.dataset: vctk_test
  - /datasets@testset.degraded_dataset.dataset: vctk_test

  - /degradations@trainset.degraded_dataset.degradations: fsd50k_train
  - /degradations@valset.degraded_dataset.degradations: fsd50k_test
  - /degradations@testset.degraded_dataset.degradations: fsd50k_test

batch_size: 4
num_workers: 4
pin_memory: True
persistent_workers: True

trainset:
  _target_: src.datasets.UnpairedAudioDataset
  x0_key: original_waveform
  x1_key: degraded_waveform
  x1_clean_key: original_waveform
  deterministic: False
  paired: True

  degraded_dataset: # the original dataset and degradations are specified in the defauls list above but we still need to specify the target here
    _target_: src.datasets.DegradedDataset

valset:
  _target_: src.datasets.UnpairedAudioDataset
  x0_key: original_waveform
  x1_key: degraded_waveform
  x1_clean_key: original_waveform
  deterministic: True
  paired: True

  degraded_dataset:
    _target_: src.datasets.DegradedDataset

testset:
  _target_: src.datasets.UnpairedAudioDataset
  x0_key: original_waveform
  x1_key: degraded_waveform
  x1_clean_key: original_waveform
  deterministic: True
  paired: True

  degraded_dataset:
    _target_: src.datasets.DegradedDataset
