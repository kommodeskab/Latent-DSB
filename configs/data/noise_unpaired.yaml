_target_: src.data_modules.BaseDM

# UNPAIRED
# clean data: VCTK
# degraded data: LibriSpeech + WHAM noise

defaults:
  # first, we specify that the degraded dataset should be libri speech...
  - /datasets@trainset.degraded_dataset.dataset: libri_train
  - /datasets@valset.degraded_dataset.dataset: libri_test
  - /datasets@testset.degraded_dataset.dataset: libri_test
  # ... with WHAM noise added to it
  - /degradations@trainset.degraded_dataset.degradations: noise_train
  - /degradations@valset.degraded_dataset.degradations: noise_test
  - /degradations@testset.degraded_dataset.degradations: noise_test
  # and the the clean target dataset should be VCTK
  - /datasets@trainset.clean_dataset: vctk_train
  - /datasets@valset.clean_dataset: vctk_test
  - /datasets@testset.clean_dataset: vctk_test

batch_size: 4
num_workers: 4
pin_memory: True
persistent_workers: True

trainset:
  _target_: src.datasets.UnpairedAudioDataset
  x0_key: waveform
  x1_key: degraded_waveform
  x1_clean_key: original_waveform
  deterministic: False
  paired: False

  degraded_dataset: # the original dataset and degradations are specified in the defauls list above but we still need to specify the target here
    _target_: src.datasets.DegradedDataset

valset:
  _target_: src.datasets.UnpairedAudioDataset
  x0_key: waveform
  x1_key: degraded_waveform
  x1_clean_key: original_waveform
  deterministic: True
  paired: False

  degraded_dataset:
    _target_: src.datasets.DegradedDataset

testset:
  _target_: src.datasets.UnpairedAudioDataset
  x0_key: waveform
  x1_key: degraded_waveform
  x1_clean_key: original_waveform
  deterministic: True
  paired: False

  degraded_dataset:
    _target_: src.datasets.DegradedDataset
